{% extends "base.html" %}

{% block title %}Usuários - Sistema Financeiro{% endblock %}

{% block content %}
<div class="page-header">
    <h1>👥 Usuários</h1>
    <p>Cadastre e gerencie os usuários do sistema</p>
</div>

<div class="grid grid-2">
    <!-- Formulário -->
    <div class="card">
        <div class="card-title">➕ Novo Usuário</div>
        <div id="user-message" class="message-area"></div>
        <form id="user-form">
            <div class="form-group">
                <label for="user-nome">Nome</label>
                <input type="text" id="user-nome" placeholder="Ex: João Silva" required>
            </div>
            <div class="form-group">
                <label for="user-email">Email</label>
                <input type="email" id="user-email" placeholder="Ex: joao@email.com" required>
            </div>
            <button type="submit" class="btn btn-primary" id="btn-create-user">Criar Usuário</button>
        </form>
    </div>

    <!-- Lista -->
    <div class="card">
        <div class="card-title">📋 Usuários Cadastrados</div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr><td colspan="4"><div class="loading">Carregando...</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
