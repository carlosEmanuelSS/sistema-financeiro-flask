<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema Financeiro Simplificado - Gerenciamento de finanças pessoais">
    <title>{% block title %}Sistema Financeiro{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body data-page="{{ active_page }}">

    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="navbar-brand">💰 <span>FinanceApp</span></a>
            <ul class="nav-links">
                <li><a href="/" class="{{ 'active' if active_page == 'home' }}">Início</a></li>
                <li><a href="/users" class="{{ 'active' if active_page == 'users' }}">Usuários</a></li>
                <li><a href="/categories" class="{{ 'active' if active_page == 'categories' }}">Categorias</a></li>
                <li><a href="/transactions" class="{{ 'active' if active_page == 'transactions' }}">Transações</a></li>
                <li><a href="/history" class="{{ 'active' if active_page == 'history' }}">Histórico</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
